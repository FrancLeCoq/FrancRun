<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Connect Wallet — Le Coq Franc</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script type="module">
  import { createAppKit } from 'https://esm.sh/@reown/appkit@1.7.7';
  import { SolanaAdapter } from 'https://esm.sh/@reown/appkit-adapter-solana@1.7.7';
  import { solana } from 'https://esm.sh/@reown/appkit/networks';
  import { PhantomWalletAdapter, SolflareWalletAdapter } from 'https://esm.sh/@solana/wallet-adapter-wallets@0.19.32';

  const PROJECT_ID = '27b5ad8cd3dfcf75c907ed60d51f8a4c';

  const solanaAdapter = new SolanaAdapter({
    wallets: [new PhantomWalletAdapter(), new SolflareWalletAdapter()]
  });

  const modal = createAppKit({
    adapters: [solanaAdapter],
    projectId: PROJECT_ID,
    networks: [solana],
    metadata: {
      name: 'FrancRun',
      description: 'Connect your Solana wallet to unlock 10 lives!',
      url: 'https://franclecoq.github.io/FrancRun/',
      icons: ['https://franclecoq.github.io/FrancRun/favicon.ico']
    },
    features: { email: false, socials: false }
  });

  // Expose globally for onclick
  window._wcModal = modal;

  // Listen for wallet connection
  modal.subscribeAccount(async (account) => {
    if(account?.address && window._wcPending){
      window._wcPending = false;
      const address = account.address;
      const tg = window.Telegram?.WebApp;
      if(!tg?.initData) return;
      try{
        const res = await fetch('https://mubqtnqulpyehkgubhnh.supabase.co/functions/v1/link-wallet',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ initData: tg.initData, wallet: address, verified: true })
        });
        const data = await res.json();
        if(data.ok){
          modal.close();
          window.checkStatus && window.checkStatus();
        }
      } catch(e){ console.error(e); }
    }
  });
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:linear-gradient(160deg,#0d0520,#1a0840);
  font-family:'Fredoka One',cursive;
  min-height:100vh;color:#fff;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.card{
  width:100%;max-width:360px;
  background:linear-gradient(145deg,rgba(13,5,32,0.98),rgba(30,10,65,0.98));
  border:2px solid rgba(180,100,255,0.35);
  border-radius:24px;padding:32px 24px;
  box-shadow:0 0 60px rgba(120,40,200,0.4);
  text-align:center;
}
.logo{font-size:52px;margin-bottom:8px}
h1{font-family:'Bangers',cursive;font-size:28px;color:#FFD700;letter-spacing:3px;text-shadow:0 0 20px #FFD700;margin-bottom:6px}
.sub{font-size:13px;color:#c9aaee;margin-bottom:28px;line-height:1.5}

/* Status badge */
.status{
  padding:10px 16px;border-radius:12px;font-size:13px;
  margin-bottom:20px;line-height:1.5;
}
.status.unknown {background:rgba(100,100,100,0.2);border:1px solid rgba(150,150,150,0.3);color:#aaa}
.status.no-wallet{background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);color:#fca5a5}
.status.has-franc{background:rgba(80,220,80,0.1);border:1px solid rgba(80,220,80,0.3);color:#86efac}
.status.no-franc  {background:rgba(255,165,0,0.1);border:1px solid rgba(255,165,0,0.3);color:#fcd34d}

/* Wallet info */
.wallet-info{
  background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.3);
  border-radius:12px;padding:12px;margin-bottom:20px;
  font-size:12px;color:#c084fc;word-break:break-all;display:none;
}

/* Buttons */
.btn{
  width:100%;padding:16px;border:none;border-radius:14px;
  font-size:17px;font-family:'Bangers',cursive;letter-spacing:2px;
  cursor:pointer;color:#fff;margin-top:10px;
  touch-action:manipulation;-webkit-appearance:none;
  transition:all 0.15s;
}
.btn:active{transform:scale(0.97);opacity:0.85}
.btn-phantom {background:linear-gradient(135deg,#ab9ff2,#7c5cbf);box-shadow:0 4px 20px rgba(171,159,242,0.4)}
.btn-solflare{background:linear-gradient(135deg,#fc8c03,#e06b00);box-shadow:0 4px 20px rgba(252,140,3,0.4)}
.btn-green   {background:linear-gradient(135deg,#16a34a,#15803d);box-shadow:0 4px 20px rgba(22,163,74,0.4)}
.btn-purple  {background:linear-gradient(135deg,#6d28d9,#4c1d95);box-shadow:0 4px 20px rgba(109,40,217,0.4)}
.btn-gray    {background:rgba(100,80,150,0.4);border:1px solid rgba(168,85,247,0.3);box-shadow:none}

/* Rules box */
.rules{
  margin-top:22px;padding:14px;
  background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.2);
  border-radius:12px;text-align:left;font-size:11.5px;color:#c9aaee;line-height:1.8;
}
.rules .title{font-family:'Bangers',cursive;letter-spacing:2px;font-size:13px;color:#c084fc;margin-bottom:6px}

.loading{color:#c9aaee;font-size:13px;margin:10px 0;min-height:18px}
.divider{border:none;border-top:1px solid rgba(168,85,247,0.2);margin:16px 0}
</style>
</head>
<body>
<div class="card">

  <div class="logo">🐓</div>
  <h1>LE COQ FRANC</h1>
  <p class="sub">Connect your Solana wallet to unlock<br><b style="color:#FFD700">10 lives</b> + <b style="color:#FFD700">+1 life</b> every 100 eggs!</p>

  <!-- Dynamic status -->
  <div class="status unknown" id="statusBox">
    🔄 Checking your status...
  </div>

  <!-- Wallet address display -->
  <div class="wallet-info" id="walletInfo"></div>

  <!-- Loading indicator -->
  <div class="loading" id="loadingMsg"></div>

  <!-- Connect buttons (shown when no wallet linked) -->
  <div id="connectSection">

    <!-- Play sans wallet en premier -->
    <button class="btn btn-gray" onclick="goToGame()">🎮 Play with 1 life (free)</button>

    <hr class="divider">

    <!-- Phantom -->
    <button class="btn btn-phantom" onclick="connectPhantom()" style="margin-top:4px">
      👻 Connect Phantom
    </button>

    <!-- Solflare -->
    <button class="btn btn-solflare" onclick="connectSolflare()" style="margin-top:10px">
      ☀️ Connect Solflare
    </button>

    <!-- WalletConnect -->
    <button class="btn" onclick="connectWalletConnect()" style="margin-top:10px;background:linear-gradient(135deg,#1a6b9e,#0d4f7a);box-shadow:0 4px 20px rgba(26,107,158,0.4)">
      🔗 WalletConnect
    </button>

  </div>

  <!-- Wallet linked — actions -->
  <div id="linkedSection" style="display:none">
    <button class="btn btn-green"  onclick="goToGame()">🎮 PLAY NOW</button>
    <button class="btn btn-gray"   onclick="unlinkWallet()" style="margin-top:8px;font-size:13px">🔗 Change wallet</button>
  </div>

  <div class="rules">
    <div class="title">💎 $FRANC RULES</div>
    <span style="color:#ff8888">🖤 Without $FRANC:</span> <b style="color:#fff">1 life</b> only<br>
    <span style="color:#a3e635">💚 Holding $FRANC:</span> <b style="color:#FFD700">10 lives</b> to start<br>
    &nbsp;&nbsp;→ <b style="color:#FFD700">+1 life</b> every 100 eggs collected
  </div>

</div>

<script>
const BACKEND = 'https://mubqtnqulpyehkgubhnh.supabase.co/functions/v1'; 
const GAME_URL = 'https://franclecoq.github.io/FrancRun/';

const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); }

const statusBox      = document.getElementById('statusBox');
const walletInfo     = document.getElementById('walletInfo');
const loadingMsg     = document.getElementById('loadingMsg');
const connectSection = document.getElementById('connectSection');
const linkedSection  = document.getElementById('linkedSection');

let currentStatus = null;

// ── On load: check current status ──────────────────
window.addEventListener('load', async ()=>{
  // Vérifie si on revient de Phantom avec une signature
  if(window.location.search.includes('phantom_return')){
    await handlePhantomReturn();
    return;
  }
  if(!tg?.initData){
    setStatus('unknown','⚠️ Open this page inside Telegram to connect your wallet.');
    return;
  }
  await checkStatus();
});

async function checkStatus(){
  window.checkStatus = checkStatus; // expose globally
  setLoading('Checking your $FRANC status...');
  try{
    const res = await fetch(BACKEND+'/check-franc',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ initData: tg.initData })
    });
    const data = await res.json();
    currentStatus = data;
    setLoading('');

    if(!data.walletLinked){
      setStatus('no-wallet','🔗 No wallet connected yet.\nConnect your Solana wallet below to unlock 10 lives!');
      showConnect();
    } else if(data.hasFranc){
      setStatus('has-franc',`✅ $FRANC detected!\nWallet: ${data.walletAddress}\nBalance: ${data.balance?.toFixed(2)} $FRANC\n\n🎮 You have ${10+Math.floor((data.totalEggs||0)/100)} lives!`);
      showLinked();
    } else {
      setStatus('no-franc',`⚠️ Wallet connected but no $FRANC found.\nWallet: ${data.walletAddress}\n\nBuy $FRANC to unlock 10 lives!`);
      showLinked();
    }
  } catch(e){
    setLoading('');
    setStatus('unknown','❌ Could not reach server. Check your connection.');
    showConnect();
  }
}

function setStatus(type, msg){
  statusBox.className='status '+type;
  statusBox.textContent=msg;
}
function setLoading(msg){ loadingMsg.textContent=msg; }
function showConnect(){ connectSection.style.display='block'; linkedSection.style.display='none'; }
function showLinked() { connectSection.style.display='none';  linkedSection.style.display='block'; }

// ── Phantom deep link avec signature ───────────────
function connectPhantom(){
  const tgId = tg?.initDataUnsafe?.user?.id || 'unknown';
  const nonce = btoa(`francrun:${tgId}:${Date.now()}`).replace(/[=+/]/g,'');
  sessionStorage.setItem('phantom_nonce', nonce);

  const message = encodeURIComponent(`FrancRun wallet verification\nNonce: ${nonce}`);
  const redirectUrl = encodeURIComponent(
    'https://franclecoq.github.io/FrancRun/connect-wallet.html?phantom_return=1'
  );
  const appUrl = encodeURIComponent('https://franclecoq.github.io/FrancRun/connect-wallet.html');

  // HTTPS universal link — fonctionne dans tous les WebViews
  // iOS et Android redirigent automatiquement vers l'app Phantom si installée
  const link = `https://phantom.app/ul/v1/signMessage?encoding=utf8&message=${message}&redirect_link=${redirectUrl}&app_url=${appUrl}`;

  setStatus('unknown', '👻 Redirecting to Phantom...\nApprove the signature to verify ownership.');
  setLoading('Opening Phantom...');

  // Ouvre dans le navigateur externe — Telegram ne peut pas gérer phantom://
  if(tg) tg.openLink(link);
  else window.open(link, '_blank');

  setLoading('');
}

// ── Retour de Phantom après signature ──────────────
async function handlePhantomReturn(){
  const params = new URLSearchParams(window.location.search);
  if(!params.get('phantom_return')) return;

  const pubkey    = params.get('phantom_account') || params.get('pubkey') || params.get('publicKey');
  const signature = params.get('signature');
  const nonce     = sessionStorage.getItem('phantom_nonce');

  if(!pubkey){
    setStatus('unknown', '❌ Phantom did not return a wallet address.\nPlease try again.');
    return;
  }

  setLoading('Verifying signature...');

  // Vérifie la signature côté backend
  try{
    const res = await fetch(BACKEND+'/link-wallet',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        initData:  tg?.initData,
        wallet:    pubkey,
        signature: signature || null,
        nonce:     nonce || null,
        verified:  !!signature // true si Phantom a signé
      })
    });
    const data = await res.json();
    setLoading('');
    if(data.ok){
      sessionStorage.removeItem('phantom_nonce');
      // Nettoie l'URL
      window.history.replaceState({}, '', window.location.pathname);
      await checkStatus();
    } else {
      setStatus('unknown', '❌ Error: '+(data.error||'Unknown'));
    }
  } catch(e){
    setLoading('');
    setStatus('unknown', '❌ Connection error. Please try again.');
  }
}

// ── Solflare deep link avec signature ──────────────
function connectSolflare(){
  const tgId = tg?.initDataUnsafe?.user?.id || 'unknown';
  const nonce = btoa(`francrun:${tgId}:${Date.now()}`).replace(/=/g,'');
  sessionStorage.setItem('phantom_nonce', nonce);

  const message = encodeURIComponent(`FrancRun wallet verification\nNonce: ${nonce}`);
  const redirectUrl = encodeURIComponent(window.location.href + '?phantom_return=1');

  const nativeLink = `solflare://signMessage?message=${message}&redirect=${redirectUrl}`;
  const webLink    = `https://solflare.com/ul/v1/signMessage?message=${message}&redirect_link=${redirectUrl}`;

  setStatus('unknown', '☀️ Opening Solflare to verify ownership...\nApprove the signature request.');
  setLoading('Redirecting to Solflare...');

  window.location.href = nativeLink;
  setTimeout(()=>{ window.location.href = webLink; setLoading(''); }, 2000);
}

// ── WalletConnect modal ─────────────────────────────
function connectWalletConnect(){
  if(!window._wcModal){
    alert('WalletConnect loading... please try again in a moment.');
    return;
  }
  window._wcPending = true;
  window._wcModal.open();
}
async function connectManual(){
  const address = (document.getElementById('manualAddress')?.value||'').trim();
  if(!address || address.length < 32){
    alert('Please enter a valid Solana address (32-44 characters).');
    return;
  }
  if(!tg?.initData){
    alert('Open this page inside Telegram.');
    return;
  }
  setLoading('Linking wallet...');
  try{
    const res = await fetch(BACKEND+'/link-wallet',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        initData: tg.initData,
        wallet:   address,
        verified: false // pas de signature — accès basique
      })
    });
    const data = await res.json();
    setLoading('');
    if(data.ok) await checkStatus();
    else alert('Error: '+(data.error||'Unknown'));
  } catch(e){
    setLoading('');
    alert('Error: '+e.message);
  }
}
async function connectManual(){
  const address = (document.getElementById('manualAddress')?.value||'').trim();
  if(!address || address.length < 32){
    alert('Please enter a valid Solana address (32-44 characters).');
    return;
  }
  if(!tg?.initData){
    alert('Open this page inside Telegram.');
    return;
  }
  setLoading('Linking wallet...');
  try{
    const res = await fetch(BACKEND+'/link-wallet',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ initData: tg.initData, wallet: address })
    });
    const data = await res.json();
    setLoading('');
    if(data.ok) await checkStatus();
    else alert('Error: '+(data.error||'Unknown'));
  } catch(e){
    setLoading('');
    alert('Error: '+e.message);
  }
}

// ── Unlink wallet ───────────────────────────────────
async function unlinkWallet(){
  if(!confirm('Disconnect your wallet? You will lose your 10 lives bonus.')) return;
  setLoading('Unlinking...');
  try{
    await fetch(BACKEND+'/unlink-wallet',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ initData: tg.initData })
    });
    setLoading('');
    await checkStatus();
  } catch(e){
    setLoading('');
  }
}

// ── Go to game ──────────────────────────────────────
function goToGame(){
  if(tg) tg.openLink(GAME_URL);
  else window.location.href = GAME_URL;
}
</script>
</body>
</html>
