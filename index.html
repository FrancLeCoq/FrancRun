<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐓 FrancRun</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0d0520;font-family:'Fredoka One',cursive;overflow:hidden;width:100vw;height:100vh}
canvas{position:fixed;inset:0;z-index:1;pointer-events:none}
#gameTouch{position:fixed;inset:0;z-index:2;display:none;touch-action:none}
#ui{position:fixed;top:12px;left:14px;color:#fff;z-index:5;pointer-events:none;line-height:1.6}
#ui .label{font-size:13px;color:#b89fd4;letter-spacing:1px}
#ui .val{color:#FFD700;font-size:22px;font-family:'Bangers',cursive;letter-spacing:2px}
#weaponInfo{position:fixed;top:12px;left:50%;transform:translateX(-50%);color:#FFD700;z-index:5;font-size:15px;font-family:'Bangers',cursive;letter-spacing:2px;text-shadow:0 0 15px #FFD700;pointer-events:none;opacity:0;transition:opacity 0.4s}
#livesBar{position:fixed;top:10px;right:12px;z-index:5;display:flex;gap:5px;pointer-events:none}
#lvlProgress{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:5;width:300px;pointer-events:none}
#lvlProgress .bar-bg{background:rgba(0,0,0,0.6);border-radius:20px;height:12px;border:1px solid rgba(180,100,255,0.35);overflow:hidden}
#lvlProgress .bar-fill{height:100%;background:linear-gradient(90deg,#a855f7,#FFD700);border-radius:20px;transition:width 0.3s}
#lvlProgress .bar-label{text-align:center;font-size:10px;color:#b89fd4;margin-top:3px}
#msg{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);font-size:76px;color:#fff;text-shadow:0 0 40px #fff;opacity:0;transition:.3s;z-index:15;pointer-events:none;white-space:nowrap;font-family:'Bangers',cursive;letter-spacing:5px}
#msg.show{opacity:1}
#msg.gameover{color:#cc0000;text-shadow:0 0 30px #ff0000,0 0 60px #880000,0 0 100px #440000;font-size:72px;animation:bloodPulse 0.5s ease-in-out infinite alternate}
@keyframes bloodPulse{0%{text-shadow:0 0 50px #ff0000,0 0 100px #cc0000,0 0 150px #880000,0 0 200px #440000;color:#880000;transform:translate(-50%,-50%) scale(0.92) skewX(-1deg)}100%{text-shadow:0 0 80px #ff2200,0 0 150px #ff0000,0 0 220px #cc0000,0 0 300px #880000;color:#ff0000;transform:translate(-50%,-50%) scale(1.08) skewX(1deg)}}
#levelup{position:fixed;top:28%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:#FFD700;text-shadow:0 0 20px #FFD700;opacity:0;transition:.3s;z-index:15;pointer-events:none;font-family:'Bangers',cursive;letter-spacing:4px}
#levelup.show{opacity:1}
#panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;max-height:92vh;overflow-y:auto;background:linear-gradient(145deg,rgba(13,5,32,0.98),rgba(30,10,65,0.98));color:#fff;padding:26px 22px;border-radius:22px;z-index:20;border:2px solid rgba(180,100,255,0.35);box-shadow:0 0 60px rgba(120,40,200,0.4);text-align:center}
#panel.hidden{display:none!important}
#panel h2{font-size:30px;margin-bottom:4px;color:#FFD700;font-family:'Bangers',cursive;letter-spacing:3px;text-shadow:0 0 20px #FFD700}
#panel p{font-size:13px;color:#c9aaee;margin-bottom:14px;line-height:1.5}
.btn{width:100%;padding:15px;border:none;border-radius:12px;font-size:16px;cursor:pointer;color:#fff;margin-top:8px;font-family:'Bangers',cursive;letter-spacing:2px;touch-action:manipulation;-webkit-appearance:none;display:block;transition:all 0.15s}
.btn:active{opacity:0.8;transform:scale(0.97)}
.btn-play{background:linear-gradient(135deg,#16a34a,#15803d);box-shadow:0 4px 15px rgba(22,163,74,0.4)}
.btn-blue{background:linear-gradient(135deg,#6d28d9,#4c1d95);box-shadow:0 4px 15px rgba(109,40,217,0.5)}
.btn-gray{background:rgba(100,80,150,0.4);border:1px solid rgba(168,85,247,0.3);box-shadow:none}
.divider{border:none;border-top:1px solid rgba(168,85,247,0.2);margin:12px 0}
.slist{text-align:left;margin:8px 0;max-height:200px;overflow-y:auto}
.slist li{padding:5px 8px;border-bottom:1px solid rgba(180,100,255,0.1);font-size:12px;list-style:none;display:flex;justify-content:space-between;align-items:center}
.franc-box{margin-top:12px;padding:11px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.25);border-radius:12px;text-align:left}
/* Wallet badge */
.wallet-btn{width:100%;padding:14px 16px;border-radius:14px;margin-top:10px;display:flex;align-items:center;gap:12px;cursor:pointer;border:none;touch-action:manipulation;transition:all 0.15s;text-align:left}
.wallet-btn:active{transform:scale(0.97);opacity:0.85}
.wallet-btn.disconnected{background:linear-gradient(135deg,rgba(217,119,6,0.25),rgba(180,90,0,0.2));border:2px solid rgba(217,119,6,0.6)}
.wallet-btn.connected{background:linear-gradient(135deg,rgba(22,163,74,0.25),rgba(15,100,50,0.2));border:2px solid rgba(163,230,53,0.6)}
.wallet-btn .wlock{font-size:28px;flex-shrink:0;line-height:1}
.wallet-btn .wtxt{flex:1}
.wallet-btn .wt-main{font-family:'Bangers',cursive;font-size:20px;letter-spacing:2px;display:block}
.wallet-btn.disconnected .wt-main{color:#fcd34d}
.wallet-btn.connected .wt-main{color:#a3e635;text-shadow:0 0 10px rgba(163,230,53,0.5)}
.wallet-btn .wt-sub{font-size:11px;display:block;margin-top:2px}
.wallet-btn.disconnected .wt-sub{color:#fbbf24;opacity:0.8}
.wallet-btn.connected .wt-sub{color:#86efac}
/* Score */
.score-section{margin-top:4px}
.my-score{background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.25);border-radius:10px;padding:8px 12px;margin-bottom:8px;text-align:left;font-size:12px}
.my-score .ms-title{font-family:'Bangers',cursive;letter-spacing:2px;font-size:13px;color:#FFD700;margin-bottom:4px}
.top3{display:flex;gap:6px;margin-bottom:8px}
.podium{flex:1;background:rgba(100,80,150,0.2);border-radius:10px;padding:8px 6px;text-align:center;font-size:11px}
.podium .medal{font-size:20px;display:block;margin-bottom:3px}
.podium .pname{font-size:10px;color:#c9aaee;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80px;margin:0 auto}
.podium .pscore{font-family:'Bangers',cursive;font-size:14px;color:#FFD700}
/* Touch */
#touch-zone{position:fixed;inset:0;z-index:6;display:none;touch-action:none}
#joystick-base{position:fixed;border-radius:50%;background:rgba(168,85,247,0.12);border:2.5px solid rgba(168,85,247,0.5);display:none;transform:translate(-50%,-50%);pointer-events:none;width:150px;height:150px}
#joystick-stick{position:fixed;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(230,180,255,0.95),rgba(160,80,240,0.85));border:2.5px solid rgba(240,200,255,0.9);display:none;transform:translate(-50%,-50%);pointer-events:none;width:66px;height:66px;box-shadow:0 0 18px rgba(168,85,247,0.8)}
#modeBtn{position:fixed;bottom:14px;right:14px;z-index:8;display:none;background:rgba(30,10,65,0.85);border:1.5px solid rgba(168,85,247,0.5);border-radius:20px;padding:6px 13px;color:#c084fc;font-size:11px;font-family:'Fredoka One',cursive;cursor:pointer;touch-action:manipulation;letter-spacing:1px}
@keyframes heartPop{0%{transform:scale(1)}40%{transform:scale(1.8)}70%{transform:scale(0.9)}100%{transform:scale(1)}}
@keyframes lifeGain{0%{opacity:0;transform:translate(-50%,-20px) scale(0.5)}30%{opacity:1;transform:translate(-50%,-40px) scale(1.2)}80%{opacity:1;transform:translate(-50%,-60px) scale(1)}100%{opacity:0;transform:translate(-50%,-80px) scale(0.8)}}
#lifeGainMsg{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-family:'Bangers',cursive;letter-spacing:3px;color:#ff4444;text-shadow:0 0 20px #ff0000;z-index:25;pointer-events:none;opacity:0;display:none;white-space:nowrap}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="gameTouch"></div>
<div id="touch-zone"></div>
<div id="joystick-base"></div>
<div id="joystick-stick"></div>
<button id="modeBtn" onclick="toggleMode()">🕹️ JOYSTICK</button>
<div id="ui">
  <div class="label">SCORE</div><div class="val" id="scoreEl">0</div>
  <div class="label" style="margin-top:3px">LEVEL</div><div class="val" id="levelEl">1</div>
</div>
<div id="lifeGainMsg"></div>
<div id="livesBar"></div>
<div id="weaponInfo"></div>
<div id="msg"></div>
<div id="levelup"></div>
<div id="lvlProgress">
  <div class="bar-bg"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
  <div class="bar-label" id="barLabel">0 / 30 eggs → Level 2</div>
</div>

<div id="panel">
  <h2>🐓 FRANC RUN</h2>
  <p>Collect golden eggs &amp; dodge enemies!<br>
  <span style="color:#FFD700;font-size:12px">30 eggs = +1 level &bull; 10 levels + 💀 Sudden Death</span><br>
  <span style="color:#c9aaee;font-size:11px">Weapons from level 4 &bull; Level 11 = Sudden Death!</span></p>

  <button class="btn btn-play" id="playBtn" onclick="startGame()" style="opacity:0.5" disabled>⏳ Loading...</button>

  <button class="wallet-btn disconnected" id="walletBtn" onclick="goToWallet()">
    <span class="wlock" id="walletLock">🔒</span>
    <span class="wtxt">
      <span class="wt-main" id="walletMain">TAP TO UNLOCK 10 LIVES</span>
      <span class="wt-sub" id="walletSub">Wallet not connected</span>
    </span>
  </button>

  <hr class="divider">
  <button class="btn btn-blue" onclick="toggleScorePanel()">🏆 High Scores</button>
  <div id="scorePanel" style="display:none;margin-top:10px">
    <div class="score-section" id="scoreSection"></div>
  </div>
  <div class="franc-box">
    <div style="font-family:'Bangers',cursive;letter-spacing:2px;font-size:13px;color:#c084fc;margin-bottom:8px">💎 $FRANC RULES</div>
    <div style="font-size:12px;color:#c9aaee;line-height:2">
      <div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">💔</span><span><span style="color:#ff8888">Without $FRANC:</span> <b style="color:#fff">1 life only</b></span></div>
      <div style="display:flex;align-items:flex-start;gap:8px;margin-top:4px"><span style="font-size:18px">❤️</span><span><span style="color:#a3e635">Hold $FRANC:</span><br><b style="color:#FFD700">10 lives</b> + <b style="color:#FFD700">+1 life</b>/100 eggs<br><b style="color:#00eeff">+ triple shot</b> 🔫🔫🔫</span></div>
    </div>
  </div>
</div>

<script>
const SUPABASE       = 'https://mubqtnqulpyehkgubhnh.supabase.co/functions/v1';
const WALLET_MINIAPP = 'https://t.me/FrancisLeCoqBot/wallet'; // Mini App Telegram

// ══ WALLET ════════════════════════════════════════════════════
function goToWallet(){
  const tg=window.Telegram?.WebApp;
  // openTelegramLink ouvre dans le WebView Telegram natif
  if(tg&&tg.openTelegramLink){
    tg.openTelegramLink(WALLET_MINIAPP);
  } else if(tg&&tg.openLink){
    tg.openLink(WALLET_MINIAPP);
  } else {
    window.open(WALLET_MINIAPP,'_blank');
  }
}

function updateWalletBadge(){
  const btn=document.getElementById('walletBtn');
  const lock=document.getElementById('walletLock');
  const main=document.getElementById('walletMain');
  const sub=document.getElementById('walletSub');
  if(!btn)return;
  if(hasFranc){
    btn.className='wallet-btn connected';
    lock.textContent='🔓';
    main.textContent='WALLET CONNECTED ✅';
    sub.textContent=`$FRANC detected — ${MAX_LIVES} lives unlocked!`;
  } else if(walletLinked){
    btn.className='wallet-btn disconnected';
    lock.textContent='🔒';
    main.textContent='NO $FRANC FOUND';
    sub.textContent='Buy $FRANC to unlock bonuses';
  } else {
    btn.className='wallet-btn disconnected';
    lock.textContent='🔒';
    main.textContent='TAP TO UNLOCK 10 LIVES';
    sub.textContent='Wallet not connected';
  }
}

function enablePlayBtn(){
  const btn=document.getElementById('playBtn');
  if(!btn)return;
  btn.disabled=false;
  btn.style.opacity='1';
  btn.textContent='▶ PLAY';
}

// ══ CANVAS ════════════════════════════════════════════════════
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
addEventListener('resize',resize);resize();

const scoreEl=document.getElementById('scoreEl'),levelEl=document.getElementById('levelEl');
const livesBar=document.getElementById('livesBar'),panel=document.getElementById('panel');
const msgEl=document.getElementById('msg'),levelupEl=document.getElementById('levelup');
const weaponEl=document.getElementById('weaponInfo'),barFill=document.getElementById('barFill'),barLabel=document.getElementById('barLabel');
const gameTouch=document.getElementById('gameTouch'),joystickBase=document.getElementById('joystick-base'),joystickStick=document.getElementById('joystick-stick');

const chickenImg=new Image(),coinImg=new Image();
chickenImg.src='https://franclecoq.github.io/FrancRun/coq_pilote.png';
coinImg.src='https://franclecoq.github.io/FrancRun/piece_1f.png';

const isMobile=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent)||window.innerWidth<700;
const SCALE=isMobile?0.58:1.0,MOBILE_SPD=isMobile?0.35:1.0;

const AC=new(window.AudioContext||window.webkitAudioContext)();
document.addEventListener('click',()=>AC.resume(),{once:true});
document.addEventListener('touchstart',()=>AC.resume(),{once:true});
function playSound(type){
  if(AC.state==='suspended')AC.resume();
  const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);const t=AC.currentTime;
  if(type==='shoot'){o.type='square';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(200,t+0.08);g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.start(t);o.stop(t+0.1);}
  else if(type==='coin'){o.type='sine';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(1320,t+0.15);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.start(t);o.stop(t+0.2);}
  else if(type==='hit'){o.type='sawtooth';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(80,t+0.2);g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);o.start(t);o.stop(t+0.25);}
  else if(type==='die'){o.type='sawtooth';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(40,t+0.8);g.gain.setValueAtTime(0.35,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.9);o.start(t);o.stop(t+0.9);}
  else if(type==='levelup'){[523,659,784,1047].forEach((f,i)=>{const o2=AC.createOscillator(),g2=AC.createGain();o2.connect(g2);g2.connect(AC.destination);o2.type='sine';o2.frequency.value=f;const st=t+i*0.12;g2.gain.setValueAtTime(0,st);g2.gain.linearRampToValueAtTime(0.2,st+0.05);g2.gain.exponentialRampToValueAtTime(0.001,st+0.2);o2.start(st);o2.stop(st+0.2);});return;}
  else if(type==='kill'){o.type='triangle';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(50,t+0.15);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.start(t);o.stop(t+0.2);}
}

// ══ SCORES ════════════════════════════════════════════════════
function getLocalScores(){try{return JSON.parse(localStorage.getItem('lcfScores')||'[]')}catch(e){return[]}}
function saveLocalScore(s,lvl){let sc=getLocalScores();sc.push({score:s,level:lvl,date:new Date().toLocaleDateString('en')});sc.sort((a,b)=>b.score-a.score);sc=sc.slice(0,10);try{localStorage.setItem('lcfScores',JSON.stringify(sc))}catch(e){}}

let scorePanelOpen=false;
function toggleScorePanel(){
  const sp=document.getElementById('scorePanel');if(!sp)return;
  scorePanelOpen=!scorePanelOpen;
  sp.style.display=scorePanelOpen?'block':'none';
  if(scorePanelOpen)renderScorePanel(document.getElementById('scoreSection'));
}
async function renderScorePanel(sec){
  if(!sec)return;
  sec.innerHTML='<div style="color:#c9aaee;font-size:11px;padding:8px;text-align:center">⏳ Loading...</div>';
  const tg=window.Telegram?.WebApp;
  const myId=tg?.initDataUnsafe?.user?.id?.toString();
  const myName=tg?.initDataUnsafe?.user?.first_name||'You';
  try{
    const res=await fetch(SUPABASE+'/save-score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'leaderboard',game_id:'francrun',limit:10})});
    const data=res.ok?await res.json():null;
    const rows=data?.leaderboard||[];
    const myRec=rows.find(r=>String(r.telegram_id)===String(myId));
    const myBest=myRec?myRec.best_score||myRec.score||0:getLocalScores()[0]?.score||0;
    const myRank=rows.findIndex(r=>String(r.telegram_id)===String(myId))+1;
    let html=`<div class="my-score"><div class="ms-title">👤 YOUR BEST</div><div style="display:flex;justify-content:space-between;align-items:center"><span>${myName}${myRank>0?` <span style="color:#c9aaee;font-size:10px">#${myRank}</span>`:''}</span><span style="font-family:'Bangers',cursive;font-size:18px;color:#FFD700">${myBest} 🥚</span></div></div>`;
    if(rows.length>=2){
      const medals=['🥇','🥈','🥉'];
      const order=rows.length>=3?[1,0,2]:[0,1];
      html+='<div class="top3">';
      order.forEach(i=>{if(!rows[i])return;const r=rows[i];const n=(r.telegram_name||r.telegram_username||'Player').slice(0,8);html+=`<div class="podium"><span class="medal">${medals[i]}</span><div class="pname">${n}</div><div class="pscore">${r.best_score||r.score||0}</div></div>`;});
      html+='</div>';
    }
    if(rows.length){
      html+='<div style="font-family:Bangers,cursive;letter-spacing:2px;font-size:12px;color:#c084fc;margin-bottom:4px">TOP 10</div><ul class="slist">';
      rows.forEach((r,i)=>{const n=r.telegram_name||r.telegram_username||'Player';const franc=r.has_franc?'💎':'';const isMe=String(r.telegram_id)===String(myId);const bg=isMe?'background:rgba(255,215,0,0.07);border-radius:6px':'';html+=`<li style="${bg}"><span>${['🥇','🥈','🥉'][i]||'#'+(i+1)} <b>${n}</b>${franc?` <span style="color:#FFD700">${franc}</span>`:''}${isMe?' 👈':''}</span><span style="color:#FFD700;font-family:Bangers,cursive">${r.best_score||r.score||0} 🥚</span></li>`;});
      html+='</ul>';
    } else {renderLocalHtml(sec);return;}
    sec.innerHTML=html;
  }catch(e){renderLocalHtml(sec);}
}
function renderLocalHtml(sec){
  const sc=getLocalScores();
  if(!sc.length){sec.innerHTML='<div style="color:#888;font-size:12px;text-align:center;padding:12px">No scores yet!</div>';return;}
  let h='<ul class="slist">';sc.forEach((s,i)=>{h+=`<li><span>${['🥇','🥈','🥉'][i]||'#'+(i+1)} Lvl${s.level||'?'} ${s.date}</span><span style="color:#FFD700;font-family:Bangers,cursive">${s.score}</span></li>`;});h+='</ul>';
  sec.innerHTML=h;
}

let shakeAmt=0,shakeDur=0;
function triggerShake(a,d){shakeAmt=Math.max(shakeAmt,a);shakeDur=Math.max(shakeDur,d);}
function applyShake(){if(shakeDur>0){ctx.translate((Math.random()-0.5)*shakeAmt*2,(Math.random()-0.5)*shakeAmt*2);shakeDur--;if(!shakeDur)shakeAmt=0;}}

const EGGS_PER_LEVEL=30,MAX_LEVEL=11,MORT_SUBITE=11;
function getLevel(sc){return Math.min(MAX_LEVEL,Math.floor(sc/EGGS_PER_LEVEL)+1);}
function isMortSubite(lvl){return lvl>=MORT_SUBITE;}
function getWeapon(lvl){return lvl>=4?'pistol':'none';}
function getShootRate(lvl){if(lvl<4)return 0;if(lvl===4)return 18;if(lvl===5)return 15;if(lvl===6)return 13;if(lvl===7)return 11;if(lvl===8)return 9;if(lvl===9)return 7;return 5;}
function getLevelEggs(sc){return sc%EGGS_PER_LEVEL;}
function getLevelProgress(sc){return getLevel(sc)>=MAX_LEVEL?100:(getLevelEggs(sc)/EGGS_PER_LEVEL)*100;}
function getEnemySpeed(lvl){let s;if(lvl===1)s=0.6;else if(lvl<=6)s=1.0+(lvl-1)*0.22;else if(lvl===7)s=1.0+5*0.22*0.75;else s=1.0+5*0.22*0.75+(lvl-7)*0.18;if(isMortSubite(lvl)){const beyond=Math.max(0,score-(MAX_LEVEL-1)*EGGS_PER_LEVEL);s+=Math.floor(beyond/30)*0.12;}return s*MOBILE_SPD;}
function getHomingRatio(lvl){if(lvl<=3)return 0;if(lvl===4)return 0.10;if(lvl===5)return 0.20;if(lvl===6)return 0.30;if(lvl===7)return 0.40;if(lvl>=8)return 0.50;return 0.50;}
function getMortSubiteTier(){return Math.min(20,MORT_SUBITE+Math.floor(Math.max(0,score-(MAX_LEVEL-1)*EGGS_PER_LEVEL)/30));}

// ══ $FRANC — BLOQUE PLAY JUSQU'À LA FIN ══════════════════════
let MAX_LIVES=1,hasFranc=false,walletLinked=false,totalEggsEver=0;

async function detectFranc(){
  // Désactive PLAY pendant le chargement
  const btn=document.getElementById('playBtn');

function drawBullet(b){ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.angle);const col=b.type==='pistol3'?'#00ff88':b.type==='pistol2'?'#00eeff':'#FFD700';ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=8;ctx.beginPath();ctx.ellipse(0,0,8,3,0,0,Math.PI*2);ctx.fill();ctx.restore();}
function drawParticle(p){ctx.save();ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=4;ctx.beginPath();ctx.arc(p.x,p.y,p.r*(p.life/p.maxLife),0,Math.PI*2);ctx.fill();ctx.restore();}

function update(){
  if(gameState!=='play')return;frameCount++;updatePlayerMovement();
  const lvl=getLevel(score);
  if(lvl!==lastLevel&&lvl<=MAX_LEVEL){showLevelUp(lvl);lastLevel=lvl;spawnParticles(player.x,player.y,'#FFD700',20,true);spawnParticles(player.x,player.y,'#a855f7',15,true);if(lvl===7||lvl===9||lvl===10||isMortSubite(lvl))player.inv=Math.max(player.inv,180);}
  updateProgressBar();
  const effectiveLvl=isMortSubite(lvl)?getMortSubiteTier():lvl;const mBonus=isMobile?20:0;
  let base;if(effectiveLvl===1)base=70+mBonus;else if(effectiveLvl===2)base=55+mBonus;else if(effectiveLvl===3)base=42+mBonus;else if(effectiveLvl===4)base=32+mBonus;else if(effectiveLvl===5)base=26+mBonus;else if(effectiveLvl===6)base=22+mBonus;else if(effectiveLvl===7)base=20+mBonus;else if(effectiveLvl===8)base=16+mBonus;else if(effectiveLvl===9)base=13+mBonus;else if(effectiveLvl===10)base=10+mBonus;else base=Math.max(6,10-(effectiveLvl-11)*0.8)+mBonus;
  if(frameCount%Math.floor(base)===0)enemies.push(spawnEnemy(lvl));if(effectiveLvl>=5&&frameCount%Math.floor(base*1.8)===0)enemies.push(spawnEnemy(lvl));if(effectiveLvl>=(isMobile?9:8)&&frameCount%Math.floor(base*2.5)===0)enemies.push(spawnEnemy(lvl));if(isMortSubite(lvl)&&getMortSubiteTier()>=13&&frameCount%Math.floor(base*3.5)===0)enemies.push(spawnEnemy(lvl));if(effectiveLvl>=6&&frameCount%Math.floor(base*0.95)===0){const e=spawnEnemy(lvl);e.homing=false;enemies.push(e);}
  if(Math.random()<0.012+Math.min(lvl,15)*0.003)coins.push(spawnCoin(lvl));
  const dxa=player.x-playerAnim.lastX,dya=player.y-playerAnim.lastY;playerAnim.speed=Math.hypot(dxa,dya);playerAnim.lastX=player.x;playerAnim.lastY=player.y;playerAnim.targetTilt=dxa*0.5;playerAnim.tiltAngle+=(playerAnim.targetTilt-playerAnim.tiltAngle)*0.15;playerAnim.bobPhase+=playerAnim.speed>1?0.18:0.04;playerAnim.breathe+=0.04;playerAnim.squish+=(1-playerAnim.squish)*0.2;
  const weapon=getWeapon(lvl);
  if(weapon!=='none'){
    if(shootCooldown>0)shootCooldown--;
    const homingEnemies=enemies.filter(e=>e.homing);const homingRatio=enemies.length>0?homingEnemies.length/enemies.length:0;const baseRate=getShootRate(lvl);const adaptedRate=Math.max(2,Math.round(baseRate*(1-homingRatio*0.7)));
    if(shootCooldown<=0&&homingEnemies.length>0){
      const sorted=[...homingEnemies].sort((a,b)=>Math.hypot(player.x-a.x,player.y-a.y)-Math.hypot(player.x-b.x,player.y-b.y));const spd=10;
      const t1=sorted[0];const ang1=Math.atan2(t1.y-player.y,t1.x-player.x);bullets.push({x:player.x,y:player.y,vx:Math.cos(ang1)*spd,vy:Math.sin(ang1)*spd,angle:ang1,type:'pistol1',life:70});
      const t2=sorted.find(e=>{const a=Math.atan2(e.y-player.y,e.x-player.x);return Math.abs(a-ang1)>0.52;});
      if(t2){const ang2=Math.atan2(t2.y-player.y,t2.x-player.x);bullets.push({x:player.x,y:player.y,vx:Math.cos(ang2)*spd,vy:Math.sin(ang2)*spd,angle:ang2,type:'pistol2',life:70});if(hasFranc){const t3=sorted.find(e=>{const a=Math.atan2(e.y-player.y,e.x-player.x);return Math.abs(a-ang1)>0.52&&Math.abs(a-Math.atan2(t2.y-player.y,t2.x-player.x))>0.52;});if(t3){const ang3=Math.atan2(t3.y-player.y,t3.x-player.x);bullets.push({x:player.x,y:player.y,vx:Math.cos(ang3)*spd,vy:Math.sin(ang3)*spd,angle:ang3,type:'pistol3',life:70});}}}
      shootCooldown=adaptedRate;playSound('shoot');playerAnim.squish=0.82;
    }
    if(homingEnemies.length>0){let cl=null,md=Infinity;homingEnemies.forEach(e=>{const d=Math.hypot(player.x-e.x,player.y-e.y);if(d<md){md=d;cl=e;}});if(cl)player.angle=Math.atan2(cl.y-player.y,cl.x-player.x);}
  }
  bullets=bullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;b.life--;if(b.life<=0||b.x<-20||b.x>canvas.width+20||b.y<-20||b.y>canvas.height+20)return false;for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];if(Math.hypot(b.x-e.x,b.y-e.y)<(e.big?38:24)*SCALE){e.hp--;spawnParticles(b.x,b.y,'#ff4400',4);if(e.hp<=0){spawnParticles(e.x,e.y,'#8b1a1a',12,true);spawnParticles(e.x,e.y,'#ff4400',8);addFloatText(e.x,e.y-20,'💀',null,28);playSound('kill');enemies.splice(i,1);}return false;}}return true;});
  enemies.forEach(e=>{e.t++;const edx=player.x-e.x,edy=player.y-e.y,ed=Math.hypot(edx,edy)||1;const spd=(e.elite?1.5:1)*getEnemySpeed(lvl);if(e.homing){e.x+=edx/ed*spd;e.y+=edy/ed*spd;}else{e.x+=e.vx;e.y+=e.vy;}if(Math.hypot(player.x-e.x,player.y-e.y)<(e.big?42:32)*SCALE&&player.inv<=0){lives--;player.inv=300;playSound('hit');triggerShake(10,22);spawnParticles(player.x,player.y,'#ffcc00',12);playerAnim.squish=0.7;updateLivesBar(lives);if(lives<=0){lives=0;updateLivesBar(0);playSound('die');triggerShake(22,70);floatingTexts=[];particles=[];clearTimeout(lifeGainTimeout);const lgEl=document.getElementById('lifeGainMsg');if(lgEl){lgEl.style.animation='none';lgEl.style.opacity='0';lgEl.style.display='none';}saveCumulativeEggs(score);saveLocalScore(score,getLevel(score));gameState='dying';setTouchOverlay(false);showMsg('GAME OVER',99999,'gameover');setTimeout(()=>{gameState='gameover';showGameOver();},1800);}}});
  enemies=enemies.filter(e=>e.x>-80&&e.x<canvas.width+80&&e.y>-80&&e.y<canvas.height+80);
  coins.forEach(c=>{c.x+=c.vx;c.y+=c.vy;c.t++;});
  coins=coins.filter(c=>{if(Math.hypot(player.x-c.x,player.y-c.y)<30*SCALE){score++;playSound('coin');spawnParticles(c.x,c.y,'#FFD700',10);spawnParticles(c.x,c.y,'#fff',4);addFloatText(c.x,c.y-20,'+1',null,20);playerAnim.squish=1.25;const curLvl=getLevel(score);if(hasFranc&&score>0&&score%100===0&&score!==lastLifeBonusScore&&lives>1&&gameState==='play'&&!isMortSubite(curLvl)){lastLifeBonusScore=score;lives=Math.min(lives+1,MAX_LIVES+1);MAX_LIVES=Math.max(MAX_LIVES,lives);updateLivesBar(lives);showLifeGain();}return false;}return c.x>-50&&c.x<canvas.width+50&&c.y>-50&&c.y<canvas.height+50;});
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.91;p.vy*=0.91;p.life--;return p.life>0;});
  floatingTexts=floatingTexts.filter(ft=>{ft.y+=ft.vy;ft.life--;return ft.life>0;});
  if(player.inv>0)player.inv--;
}

function drawBg(){
  const lvl=getLevel(score);const grd=ctx.createLinearGradient(0,0,0,canvas.height);
  if(isMortSubite(lvl)){grd.addColorStop(0,'#150005');grd.addColorStop(1,'#3a0010');}else if(lvl>=9){grd.addColorStop(0,'#0a0018');grd.addColorStop(1,'#200040');}else if(lvl>=6){grd.addColorStop(0,'#0d0520');grd.addColorStop(1,'#1a0840');}else{grd.addColorStop(0,'#0d0520');grd.addColorStop(1,'#150830');}
  ctx.fillStyle=grd;ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<80;i++){const sx=((i*137.508)%1)*canvas.width;const sy=((i*89.321+i*0.31)%1)*canvas.height*0.78;const br=Math.sin(frameCount*0.025+i*1.3)*0.35+0.65;const sz=i%7===0?1.6:i%3===0?1.0:0.6;ctx.fillStyle=i%5===0?`rgba(200,150,255,${0.28*br})`:`rgba(255,255,255,${0.20*br})`;ctx.beginPath();ctx.arc(sx,sy,sz,0,Math.PI*2);ctx.fill();}
  if(lvl>=7){const glow=ctx.createRadialGradient(canvas.width/2,canvas.height,50,canvas.width/2,canvas.height,500);glow.addColorStop(0,`rgba(${lvl>=9?255:180},${lvl>=9?0:20},${lvl>=9?0:80},0.18)`);glow.addColorStop(1,'transparent');ctx.fillStyle=glow;ctx.fillRect(0,canvas.height-500,canvas.width,500);}
}
function drawWeaponHUD(lvl){const w=getWeapon(lvl);if(w==='none')return;ctx.save();const cx=canvas.width/2,cy=canvas.height-50;ctx.fillStyle='rgba(13,5,32,0.75)';ctx.beginPath();ctx.roundRect(cx-80,cy-16,160,32,8);ctx.fill();ctx.strokeStyle='rgba(168,85,247,0.7)';ctx.lineWidth=1.5;ctx.stroke();ctx.fillStyle='#c084fc';ctx.font='bold 14px Fredoka One,cursive';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🔫 PISTOL',cx,cy);ctx.restore();}
function draw(){
  ctx.save();if(shakeDur>0)applyShake();drawBg();
  if(gameState==='menu'){ctx.fillStyle='rgba(13,5,32,0.75)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.restore();return;}
  if(gameState==='play'||gameState==='dying'){
    coins.forEach(c=>drawCoinSprite(c.x,c.y,c.t,c.bob));enemies.forEach(e=>drawEnemySprite(e.x,e.y,e.hp,e.maxHp,e.t,e.wobble,e.elite,e.big,e.homing));bullets.forEach(b=>drawBullet(b));particles.forEach(p=>drawParticle(p));
    if(player)drawChickenSprite(player.x,player.y,player.inv,playerAnim);
    if(player&&player.inv>0){const secsLeft=Math.ceil(player.inv/60);const alpha=Math.min(1,player.inv/60);ctx.save();ctx.globalAlpha=alpha*0.85;ctx.strokeStyle='#00eeff';ctx.lineWidth=2;ctx.shadowColor='#00eeff';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(player.x,player.y,36*SCALE,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=alpha;ctx.fillStyle='#00eeff';ctx.font=`bold ${14*SCALE}px Bangers,cursive`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🛡️ '+secsLeft+'s',player.x,player.y-48*SCALE);ctx.restore();}
    floatingTexts.forEach(ft=>{ctx.save();ctx.globalAlpha=ft.life/ft.maxLife;ctx.fillStyle=ft.color||'#FFD700';ctx.font=`bold ${ft.size}px Bangers,cursive`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor=ft.color||'#FFD700';ctx.shadowBlur=8;ctx.fillText(ft.text,ft.x,ft.y);ctx.restore();});
    drawWeaponHUD(getLevel(score));drawMobileHints();
    if(gameState==='dying'||gameState==='gameover'){const vig=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.height*0.2,canvas.width/2,canvas.height/2,canvas.height*0.9);vig.addColorStop(0,'rgba(120,0,0,0.0)');vig.addColorStop(0.5,'rgba(180,0,0,0.3)');vig.addColorStop(1,'rgba(80,0,0,0.85)');ctx.save();ctx.fillStyle=vig;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.restore();}
  }
  ctx.restore();
}

function showGameOver(){
  panel.style.borderColor='rgba(200,0,0,0.6)';panel.style.boxShadow='0 0 80px rgba(180,0,0,0.7)';
  const sc=getLocalScores();const rankIdx=sc.findIndex(s=>s.score===score);const rank=rankIdx+1;
  let rankHtml='';if(rank===1)rankHtml='<div style="color:#FFD700;font-size:15px;margin:6px 0">🥇 NEW RECORD!</div>';else if(rank>=2&&rank<=3)rankHtml=`<div style="color:#C0C0C0;font-size:13px;margin:6px 0">🏅 Podium #${rank}!</div>`;
  panel.innerHTML=`
    <h2 style="color:#ff0000;font-size:36px;text-shadow:0 0 20px #ff0000;letter-spacing:3px">💀 GAME OVER</h2>
    <p style="font-size:22px;color:#FFD700;margin:8px 0;font-family:'Bangers',cursive;letter-spacing:2px"><b>${score}</b> eggs — Level <b>${getLevel(score)}</b></p>
    ${rankHtml}
    <button class="btn btn-play" onclick="startGame()" style="margin-top:10px">🔄 Play Again</button>
    <button class="btn btn-gray" onclick="goMenu()" style="margin-top:6px;font-size:13px">🏠 Menu</button>
    <hr style="border:none;border-top:1px solid rgba(168,85,247,0.2);margin:14px 0">
    <b style="font-size:13px;font-family:'Bangers',cursive;letter-spacing:2px;color:#FFD700">TOP 10</b>
    <div class="score-section" id="goScoreSection" style="margin-top:6px"></div>`;
  panel.classList.remove('hidden');
  renderScorePanel(document.getElementById('goScoreSection'));
}

function goMenu(){
  gameState='menu';msgEl.className='';setTouchOverlay(false);
  panel.style.borderColor='';panel.style.boxShadow='';scorePanelOpen=false;
  panel.innerHTML=`
    <h2>🐓 FRANC RUN</h2>
    <p>Collect golden eggs &amp; dodge enemies!<br>
    <span style="color:#FFD700;font-size:12px">30 eggs = +1 level &bull; 10 levels + 💀 Sudden Death</span><br>
    <span style="color:#c9aaee;font-size:11px">Weapons from level 4 &bull; Level 11 = Sudden Death!</span></p>
    <button class="btn btn-play" id="playBtn" onclick="startGame()" style="opacity:0.5" disabled>⏳ Loading...</button>
    <button class="wallet-btn ${hasFranc?'connected':'disconnected'}" onclick="goToWallet()">
      <span class="wlock">${hasFranc?'🔓':'🔒'}</span>
      <span class="wtxt">
        <span class="wt-main">${hasFranc?'WALLET CONNECTED ✅':'TAP TO UNLOCK 10 LIVES'}</span>
        <span class="wt-sub">${hasFranc?`$FRANC detected — ${MAX_LIVES} lives unlocked!`:walletLinked?'Buy $FRANC to unlock bonuses':'Wallet not connected'}</span>
      </span>
    </button>
    <hr style="border:none;border-top:1px solid rgba(168,85,247,0.2);margin:12px 0">
    <button class="btn btn-blue" onclick="toggleScorePanel()">🏆 High Scores</button>
    <div id="scorePanel" style="display:none;margin-top:10px"><div class="score-section" id="scoreSection"></div></div>
    <div class="franc-box">
      <div style="font-family:'Bangers',cursive;letter-spacing:2px;font-size:13px;color:#c084fc;margin-bottom:6px">💎 $FRANC RULES</div>
      <div style="font-size:11px;color:#c9aaee;line-height:1.7">
        <span style="color:#ff8888">🖤 Without $FRANC:</span> <b style="color:#fff">1 life</b> only<br>
        <span style="color:#a3e635">💚 Holding $FRANC:</span> <b style="color:#FFD700">10 lives</b> + <b style="color:#FFD700">+1</b>/100 eggs + <b style="color:#00eeff">triple shot</b>
      </div>
      ${hasFranc?`<div style="margin-top:8px;padding:6px 10px;background:rgba(163,230,53,0.1);border:1px solid rgba(163,230,53,0.3);border-radius:8px;font-size:11px;text-align:center">✅ $FRANC detected! <b style="color:#FFD700">${MAX_LIVES} lives</b></div>`:''}
    </div>`;
  panel.classList.remove('hidden');
  // Relance la détection
  detectFranc();
}

function loop(){update();draw();scoreEl.textContent=score;levelEl.textContent=getLevel(score);requestAnimationFrame(loop);}
loop();
</script>
